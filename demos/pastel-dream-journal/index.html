<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a12;
    color: #e0e0f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }
  h1 {
    font-size: 1.6rem;
    letter-spacing: 0.12em;
    background: linear-gradient(90deg, #FFB5C5, #C5B5FF, #B5FFC5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.3rem;
  }
  .subtitle { font-size: 0.85rem; color: #5a5a7a; margin-bottom: 1.8rem; }

  /* ── Journal book ── */
  .journal-wrapper {
    perspective: 1400px;
    width: 460px;
    height: 640px;
    position: relative;
    margin-bottom: 2rem;
  }
  .page {
    position: absolute;
    inset: 0;
    background: #FFF5F9;
    border-radius: 8px;
    box-shadow: 0 8px 40px rgba(255,181,197,0.12), 0 2px 12px rgba(0,0,0,0.5);
    padding: 2rem 1.8rem;
    color: #4A3F55;
    font-size: 0.82rem;
    overflow-y: auto;
    backface-visibility: hidden;
    transition: transform 0.6s ease, opacity 0.6s ease;
  }
  .page.hidden-left  { transform: rotateY(20deg) translateX(-60px) scale(0.92); opacity: 0; pointer-events: none; }
  .page.hidden-right { transform: rotateY(-20deg) translateX(60px) scale(0.92); opacity: 0; pointer-events: none; }
  .page.active       { transform: rotateY(0) translateX(0) scale(1); opacity: 1; }

  .page h2 {
    text-align: center;
    background: #FFB5C5;
    color: #fff;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    font-size: 1rem;
    margin-bottom: 1rem;
  }
  .page h3 { color: #FFB5C5; font-size: 0.85rem; margin: 0.8rem 0 0.3rem; }
  .page .field-line {
    border-bottom: 1px solid #C5B5FF;
    min-height: 22px;
    margin-bottom: 0.3rem;
    line-height: 22px;
    color: #8A7F99;
    font-size: 0.78rem;
  }
  .page .field-line.filled { color: #4A3F55; }
  .page .checkbox-row {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 0.25rem;
  }
  .page .cb {
    width: 14px; height: 14px;
    border: 1.5px solid #C5B5FF;
    border-radius: 3px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #B5FFC5;
    flex-shrink: 0;
  }
  .page .cb.checked::after { content: '\2713'; }
  .page .doodle-box {
    border: 1.5px dashed #FFDDE5;
    border-radius: 10px;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #C5B5FF;
    font-size: 0.75rem;
    margin-top: 0.5rem;
  }
  .page .seal {
    text-align: center;
    margin-top: 1rem;
  }
  .page .seal-circle {
    display: inline-flex;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: #FFB5C5;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: #fff;
    box-shadow: 0 2px 8px rgba(255,181,197,0.4);
  }

  /* ── Navigation ── */
  .nav {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    margin-bottom: 1.5rem;
  }
  .nav button {
    background: #16162a;
    color: #FFB5C5;
    border: 1px solid #2a2a3a;
    width: 44px; height: 44px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    transition: all 0.2s;
  }
  .nav button:hover { border-color: #FFB5C5; background: rgba(255,181,197,0.08); }
  .nav button:disabled { opacity: 0.25; cursor: default; }
  .nav .page-info {
    font-size: 0.85rem;
    color: #6a6a8a;
    min-width: 130px;
    text-align: center;
  }
  .page-title-bar {
    font-size: 0.8rem;
    color: #8a8aaa;
    margin-bottom: 1.5rem;
    text-align: center;
  }

</head>

/* ── Viewer logic ── */
let current = 0;
const journal = document.getElementById('journal');
const info = document.getElementById('pageInfo');
const titleBar = document.getElementById('pageTitle');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

function render() {
  journal.innerHTML = '';
  pages.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'page ' + (i < current ? 'hidden-left' : i > current ? 'hidden-right' : 'active');
    div.innerHTML = p.html;
    journal.appendChild(div);
  });
  info.textContent = `${current + 1} / ${pages.length}`;
  titleBar.textContent = pages[current].title;
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === pages.length - 1;
}

prevBtn.addEventListener('click', () => { if (current > 0) { current--; render(); } });
nextBtn.addEventListener('click', () => { if (current < pages.length - 1) { current++; render(); } });
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') prevBtn.click();
  if (e.key === 'ArrowRight') nextBtn.click();
});

render();
</script>
